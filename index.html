    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { dark: '#050B1A', card: '#0A1631', gold: '#D4AF37', accent: '#1E293B' }

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050B1A; color: #E2E8F0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(10, 22, 49, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #cartDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #cartDrawer.active { transform: translateX(0); }
        #productModal { transition: transform 0.4s ease; transform: translateY(100%); }
        #productModal.active { transform: translateY(0); }
        .category-pill.active { background: #D4AF37; color: #050B1A; font-weight: 700; }

        /* CSS para seleção de sabor */
        .flavor-pill.selected { border-color: #D4AF37; background: rgba(212, 175, 55, 0.2); color: #D4AF37; }

        @keyframes pulse-whatsapp {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-whatsapp { animation: pulse-whatsapp 2s infinite; }

        @keyframes status-blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .status-dot { animation: status-blink 1.5s infinite; }
        
        #searchContainer { transition: all 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #searchContainer.active { max-height: 80px; opacity: 1; padding: 1rem; }
    </style>
</head>

        let cart = [];
        let selectedFlavor = "";

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(item => `
                <div onclick="${item.estoque ? `openModal(${item.id})` : ''}" class="bg-brand-card rounded-2xl p-3 border border-white/5 shadow-lg ${item.estoque ? 'active:scale-95' : 'opacity-60'} transition-transform relative">
                    ${!item.estoque ? '<span class="absolute top-2 right-2 bg-red-600 text-[10px] font-bold px-2 py-1 rounded-full z-10">ESGOTADO</span>' : ''}
                    <img src="${item.img}" class="w-full aspect-square object-cover rounded-xl mb-3">
                    <h3 class="text-sm font-bold truncate">${item.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-brand-gold font-black text-sm">R$ ${item.price},00</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const item = CATALOG_ITEMS.find(i => i.id === id);
            selectedFlavor = ""; 
            
            let flavorHtml = "";
            if(item.options) {
                flavorHtml = `
                    <div class="mt-4">
                        <p class="text-[10px] font-bold uppercase text-gray-500 mb-2">${item.optionsTitle}</p>
                        <div class="flex flex-wrap gap-2">
                            ${item.options.map(opt => `
                                <button onclick="selectFlavor(this, '${opt}')" class="flavor-pill border border-white/10 px-3 py-2 rounded-xl text-xs transition-all bg-white/5">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            document.getElementById('modalContent').innerHTML = `
                <img src="${item.img}" class="w-full aspect-square object-cover rounded-3xl mb-6">
                <h2 class="text-2xl font-extrabold mb-1">${item.name}</h2>
                <p class="text-gray-400 text-sm mb-4">${item.desc}</p>
                ${flavorHtml}
                <button onclick="addToCart(${item.id})" class="w-full bg-brand-gold text-brand-dark py-4 rounded-2xl font-bold mt-6 shadow-lg">
                    Adicionar ao Carrinho • R$ ${item.price},00
                </button>
            `;
            
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('productModal').classList.add('active');
        }

        function selectFlavor(btn, flavor) {
            document.querySelectorAll('.flavor-pill').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedFlavor = flavor;
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.getElementById('productModal').classList.remove('active');
        }

        function addToCart(id) {
            const item = CATALOG_ITEMS.find(i => i.id === id);
            if(item.category === 'pods' && !selectedFlavor) {
                alert("Por favor, escolha um sabor!");
                return;
            }
            cart.push({...item, flavor: selectedFlavor});
            updateCart();
            closeModal();
            toggleCart();
        }

        function updateCart() {
            const container = document.getElementById('cartItems');
            const totalElement = document.getElementById('cartTotal');
            const countElement = document.getElementById('cartCount');
            
            countElement.innerText = cart.length;
            countElement.classList.toggle('hidden', cart.length === 0);

            container.innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/5">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl">
                    <div class="flex-1">
                        <h4 class="text-sm font-bold">${item.name}</h4>
                        ${item.flavor ? `<p class="text-[10px] text-brand-gold font-bold uppercase">${item.flavor}</p>` : ''}
                        <p class="text-brand-gold font-black text-sm mt-1">R$ ${item.price},00</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-gray-500"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalElement.innerText = `R$ ${total},00`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cartOverlay').classList.toggle('hidden');
            document.getElementById('cartDrawer').classList.toggle('active');
        }

        function toggleSearch() {
            document.getElementById('searchContainer').classList.toggle('active');
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = CATALOG_ITEMS.filter(item => item.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.category-pill');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(cat) || (cat === 'todos' && btn.innerText === 'Todos')) btn.classList.add('active');
            });
            const filtered = cat === 'todos' ? CATALOG_ITEMS : CATALOG_ITEMS.filter(i => i.category === cat);
            renderProducts(filtered);
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let msg = "*PEDIDO - FÁBIO IMPORTS*\n\n";
            cart.forEach(item => {
                msg += `• ${item.name} ${item.flavor ? `(${item.flavor})` : ''} - R$ ${item.price},00\n`;
            });
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            msg += `\n*TOTAL: R$ ${total},00*`;
            window.open(`https://wa.me/5512997458002?text=${encodeURIComponent(msg)}`);
        }

        renderProducts(CATALOG_ITEMS);
    </script>
